# Conda Environment for Fabric Data Quality Framework v2.0
# =======================================================
#
# This environment provides all dependencies needed for the data quality
# framework including Great Expectations 1.x, pandas, and testing tools.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate fabric-dq
#
# To update:
#   conda env update -f environment.yml --prune

name: fabric-dq

channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python>=3.10,<3.14

  # Core dependencies
  - pandas>=2.0.0
  - numpy>=1.24.0
  - pyyaml>=6.0

  # Data processing
  - openpyxl>=3.0.0
  - xlrd>=2.0.0

  # Development and testing tools
  - pytest>=9.0.0
  - pytest-cov>=7.0.0
  - pytest-mock>=3.15.0
  - mypy>=1.19.0

  # Jupyter (for interactive development)
  - jupyter>=1.0.0
  - ipykernel>=6.0.0

  # Version control helpers
  - pre-commit>=4.0.0

  # PIP packages
  - pip>=23.0.0
  - pip:
      - great-expectations>=1.0.0,<2.0.0
      - pyarrow>=14.0.0
      - sqlalchemy>=2.0.0
      - ruff>=0.15.0
      - types-pyyaml>=6.0.0
